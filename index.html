<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Simple Shopping List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f6f4e">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1d1d1f;
      background: #f6f3ea;
    }
    body {
      margin: 0;
      padding: 18px;
      max-width: 640px;
      margin-inline: auto;
    }
    h1 {
      margin: 6px 0 14px;
      font-size: 1.8rem;
    }
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    input {
      flex: 1;
      font-size: 1.15rem;
      padding: 13px;
      border: 1px solid #bbb;
      border-radius: 10px;
      background: white;
    }
    button {
      font-size: 1rem;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      background: #2f6f4e;
      color: white;
      cursor: pointer;
    }
    button.secondary {
      background: #555;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 14px 0;
    }
    li {
      background: white;
      margin-bottom: 8px;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 1.15rem;
    }
    li.checked span {
      text-decoration: line-through;
      color: #777;
    }
    input[type="checkbox"] {
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
    }
    .item-text {
      flex: 1;
      word-break: break-word;
    }
    .x {
      background: #9b2c2c;
      padding: 8px 11px;
    }
    .hint {
      color: #555;
      font-size: .95rem;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <h1>Shopping List</h1>

  <form class="add-row" id="addForm">
    <input id="itemInput" autocomplete="off" placeholder="Add groceries, etc.">
    <button type="submit">Add</button>
  </form>

  <div>
    <button class="secondary" id="clearChecked">Clear checked</button>
    <button class="secondary" id="clearAll">Clear all</button>
  </div>

  <ul id="list"></ul>

  <p class="hint">Your list is saved on this phone. No account, no ads, no tracking.</p>

<script>
const input = document.getElementById('itemInput');
const list = document.getElementById('list');
const form = document.getElementById('addForm');
const clearCheckedBtn = document.getElementById('clearChecked');
const clearAllBtn = document.getElementById('clearAll');

let items = JSON.parse(localStorage.getItem('shoppingItems') || '[]');

function save() {
  localStorage.setItem('shoppingItems', JSON.stringify(items));
}

function render() {
  list.innerHTML = '';
  items.forEach((item, index) => {
    const li = document.createElement('li');
    if (item.checked) li.classList.add('checked');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = item.checked;
    cb.addEventListener('change', () => {
      items[index].checked = cb.checked;
      save();
      render();
    });

    const span = document.createElement('span');
    span.className = 'item-text';
    span.textContent = item.text;

    const del = document.createElement('button');
    del.className = 'x';
    del.textContent = '×';
    del.title = 'Delete item';
    del.addEventListener('click', () => {
      items.splice(index, 1);
      save();
      render();
    });

    li.append(cb, span, del);
    list.appendChild(li);
  });
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  items.push({ text, checked: false });
  input.value = '';
  save();
  render();
  input.focus();
});

clearCheckedBtn.addEventListener('click', () => {
  items = items.filter(item => !item.checked);
  save();
  render();
});

clearAllBtn.addEventListener('click', () => {
  if (confirm('Clear the whole list?')) {
    items = [];
    save();
    render();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

render();
</script>
</body>
</html>
